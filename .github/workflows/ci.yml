name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scikit-learn pytest tensorboard
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run unit tests
        run: |
          pytest -q tests/test_preprocess.py tests/test_model_shapes.py tests/test_train_smoke.py tests/test_uncertainty_training.py

      - name: Run shape smoke test
        run: |
          python scripts/dry_run_shapes.py
